<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian Archive - Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0d1117, #1a2333);
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            text-align: center;
            background: #161b22;
            padding: 50px 40px;
            border-radius: 16px;
            border: 1px solid #30363d;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.6);
            max-width: 520px;
            width: 90%;
        }
        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
            font-size: 2.4rem;
        }
        p {
            color: #8b949e;
            margin-bottom: 40px;
            font-size: 1.15rem;
        }
        .portal-btn {
            display: block;
            width: 100%;
            padding: 20px;
            margin: 15px 0;
            font-size: 1.4rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            border-radius: 12px;
            border: 2px solid;
            transition: all 0.3s ease;
        }
        .btn-void {
            background: linear-gradient(135deg, #e63946, #f77);
            border-color: #ff9999;
        }
        .btn-void:hover {
            background: linear-gradient(135deg, #f77, #ff5555);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(230, 57, 70, 0.6);
        }
        .btn-tycoon {
            background: linear-gradient(135deg, #00b894, #00e6b0);
            border-color: #55efc4;
        }
        .btn-tycoon:hover {
            background: linear-gradient(135deg, #00e6b0, #00ffcc);
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 184, 148, 0.6);
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Brian's Archive 🕹️</h1>
        <p>Choose your game:</p>
        
        <a href="void.html" class="portal-btn btn-void">
            ⚔️ Void Arena (Combat)
        </a>
        
        <a href="tycoon.html" class="portal-btn btn-tycoon">
            💰 Empire Tycoon (Idle)
        </a>
    </div>
</body>
</html>
