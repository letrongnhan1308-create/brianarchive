<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brian Archive - Portal</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1117;
            color: #c9d1d9;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            text-align: center;
            background: #161b22;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #30363d;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.5);
            max-width: 450px;
            width: 90%;
        }

        h1 {
            color: #58a6ff;
            margin-bottom: 10px;
            font-size: 2.2rem;
        }

        p {
            color: #8b949e;
            margin-bottom: 35px;
            font-size: 1.1rem;
        }

        /* Nút dịch chuyển duy nhất đến Void Arena */
        .portal-btn {
            display: block;
            padding: 20px;
            font-size: 1.3rem;
            font-weight: bold;
            color: #ffffff;
            text-decoration: none;
            border-radius: 8px;
            background: linear-gradient(135deg, #8957e5, #bc8cff);
            border: 1px solid #d2a8ff;
            box-shadow: 0px 4px 15px rgba(137, 87, 229, 0.4);
            transition: all 0.2s ease-in-out;
        }

        .portal-btn:hover {
            background: linear-gradient(135deg, #bc8cff, #d2a8ff);
            transform: translateY(-3px);
            box-shadow: 0px 6px 20px rgba(137, 87, 229, 0.6);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Welcome to Brian's Project 🕹️</h1>
        <p>Click the portal button below to enter the battle simulation.</p>

        <!-- Nút bấm duy nhất chuyển hướng sang void.html -->
        <a href="void.html" class="portal-btn">
            Get hyped bro
        </a>
    </div>

</body>
</html>
