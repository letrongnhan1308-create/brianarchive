<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Void Arena</title>
    <style>
        body { margin:0; background:#0a0a1f; color:#fff; font-family:Arial; overflow:hidden; text-align:center; }
        canvas { display:block; margin:20px auto; border:4px solid #334; image-rendering:pixelated; }
        #ui { position:absolute; top:15px; left:50%; transform:translateX(-50%); background:rgba(0,0,0,0.7); padding:10px 20px; border-radius:10px; }
    </style>
</head>
<body>
    <div id="ui">Wave <span id="wave">1</span> | Score <span id="score">0</span></div>
    <canvas id="game" width="940" height="640"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let player = { x:220, y:320, size:36, speed:6, hp:100, maxHp:100, angle:0, gunAngle:0, ammo:15, maxAmmo:15, reloading:false, reloadTime:0, lastShot:0, shootCooldown:160, damageMult:1, speedMult:1, bob:0, gunOffset:0 };
        let enemies = [], bullets = [], particles = [], powerups = [];
        let keys = {}, mouse = {x:470, y:320}, wave = 1, score = 0, gameRunning = true, shake = 0;
        
        function playSound(freq, dur) {
            const audio = new (window.AudioContext || window.webkitAudioContext)();
            const o = audio.createOscillator();
            const g = audio.createGain();
            o.type = 'square'; o.frequency.value = freq; g.gain.value = 0.3;
            o.connect(g).connect(audio.destination); o.start(); o.stop(audio.currentTime + dur);
        }
        
        function createExplosion(x, y, count, color) {
            for (let i = 0; i < count; i++) {
                particles.push({x, y, vx: (Math.random()-0.5)*13, vy: (Math.random()-0.5)*13, life: 25, color, size: 6});
            }
        }
        
        function spawnWave() {
            enemies = [];
            const count = wave % 4 === 0 ? 1 : Math.min(3 + Math.floor(wave/2), 6);
            for (let i = 0; i < count; i++) {
                const isBoss = wave % 4 === 0 && i === 0;
                enemies.push({
                    x: 650 + Math.random()*120, y: 180 + Math.random()*300,
                    size: isBoss ? 54 : 32,
                    speed: isBoss ? 3.8 : 2.7 + wave * 0.3,
                    hp: isBoss ? 420 + wave*100 : 75 + wave*45,
                    maxHp: isBoss ? 420 + wave*100 : 75 + wave*45,
                    angle: 0, isBoss
                });
            }
            document.getElementById('wave').textContent = wave;
        }
        
        function shoot() {
            if (player.reloading || player.ammo <= 0 || Date.now() - player.lastShot < player.shootCooldown) return;
            player.lastShot = Date.now();
            player.ammo--;
            player.gunOffset = -9;
            shake = 5;
            
            const bx = player.x + Math.cos(player.gunAngle) * 45;
            const by = player.y + Math.sin(player.gunAngle) * 45;
            const count = player.weapon === 2 ? 4 : 1;
            
            for (let i = 0; i < count; i++) {
                const a = player.gunAngle + (Math.random()-0.5)*0.25;
                bullets.push({x:bx, y:by, vx:Math.cos(a)*16.5, vy:Math.sin(a)*16.5, life:52, fromEnemy:false, dmg:player.damageMult});
            }
            playSound(280, 0.08);
        }
        
        function startReload() {
            if (player.reloading || player.ammo === player.maxAmmo) return;
            player.reloading = true;
            player.reloadTime = Date.now() + 1450;
        }
        
        function spawnPowerup(x, y) {
            const types = ['health','speed','ammo','damage'];
            powerups.push({x, y, type: types[Math.floor(Math.random()*4)], life: 400});
        }
        
        function update() {
            // Player movement
            if (keys['w'] || keys['W']) player.y -= player.speed * player.speedMult;
            if (keys['s'] || keys['S']) player.y += player.speed * player.speedMult;
            if (keys['a'] || keys['A']) player.x -= player.speed * player.speedMult;
            if (keys['d'] || keys['D']) player.x += player.speed * player.speedMult;
            
            player.bob = (keys['w']||keys['s']||keys['a']||keys['d']) ? Math.sin(Date.now()/70)*2 : 0;
            
            player.x = Math.max(50, Math.min(canvas.width-50, player.x));
            player.y = Math.max(50, Math.min(canvas.height-50, player.y));
            
            player.gunAngle = Math.atan2(mouse.y - player.y, mouse.x - player.x);
            player.angle = player.gunAngle;
            if (player.gunOffset < 0) player.gunOffset += 1.6;
            
            // Enemies
            for (let i = enemies.length-1; i >= 0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x, dy = player.y - e.y, d = Math.hypot(dx, dy) || 1;
                e.x += (dx/d) * e.speed;
                e.y += (dy/d) * e.speed;
                e.angle = Math.atan2(dy, dx);
                
                if (Math.random() < 0.03) {
                    bullets.push({x:e.x, y:e.y, vx:dx/d*11.5, vy:dy/d*11.5, life:55, fromEnemy:true});
                }
            }
            
            // Bullets & Collisions
            for (let i = bullets.length-1; i >= 0; i--) {
                const b = bullets[i];
                b.x += b.vx; b.y += b.vy; b.life--;
                
                if (!b.fromEnemy) {
                    for (let j = enemies.length-1; j >= 0; j--) {
                        const e = enemies[j];
                        if (Math.hypot(b.x-e.x, b.y-e.y) < e.size * 0.8) {
                            e.hp -= 26 * (b.dmg || 1);
                            bullets.splice(i,1);
                            if (e.hp <= 0) {
                                createExplosion(e.x, e.y, e.isBoss ? 50 : 25, '#ff3366');
                                score += e.isBoss ? 600 : 140;
                                spawnPowerup(e.x, e.y);
                                enemies.splice(j,1);
                                if (enemies.length === 0) {
                                    wave++;
                                    spawnWave();
                                    document.getElementById('score').textContent = score;
                                }
                            }
                            break;
                        }
                    }
                } else if (Math.hypot(b.x-player.x, b.y-player.y) < player.size*0.75) {
                    player.hp -= 18;
                    bullets.splice(i,1);
                    shake = 8;
                    if (player.hp <= 0) { alert("Game Over!"); location.reload(); }
                }
                if (b.life <= 0) bullets.splice(i,1);
            }
            
            // Powerups
            for (let i = powerups.length-1; i >= 0; i--) {
                const p = powerups[i];
                p.life--;
                if (Math.hypot(p.x - player.x, p.y - player.y) < 45) {
                    if (p.type === 'health') player.hp = Math.min(player.maxHp, player.hp + 45);
                    else if (p.type === 'speed') player.speedMult = 1.8;
                    else if (p.type === 'ammo') player.ammo = player.maxAmmo;
                    else if (p.type === 'damage') player.damageMult = 1.8;
                    powerups.splice(i,1);
                }
                if (p.life <= 0) powerups.splice(i,1);
            }
            
            // Particles
            for (let i = particles.length-1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                if (p.life <= 0) particles.splice(i,1);
            }
            
            if (player.reloading && Date.now() > player.reloadTime) {
                player.ammo = player.maxAmmo;
                player.reloading = false;
            }
            
            if (keys[' ']) shoot();
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a1f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#445577';
            ctx.lineWidth = 40;
            ctx.strokeRect(35, 35, canvas.width-70, canvas.height-70);
            
            const sx = shake > 0 ? (Math.random()-0.5)*shake : 0;
            ctx.save();
            ctx.translate(sx, 0);
            shake *= 0.8;
            
            // Player
            ctx.save();
            ctx.translate(player.x, player.y + player.bob);
            ctx.rotate(player.angle);
            ctx.fillStyle = '#00aaff';
            ctx.fillRect(-18, -18, 36, 36);
            ctx.fillStyle = '#0055aa';
            ctx.fillRect(16, -8, 38, 16);
            ctx.restore();
            
            // Enemies
            for (let e of enemies) {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(e.angle);
                ctx.fillStyle = e.isBoss ? '#aa1122' : '#ee3333';
                ctx.fillRect(-e.size/2, -e.size/2, e.size, e.size);
                ctx.restore();
            }
            
            // Bullets
            ctx.fillStyle = '#ffee77';
            for (let b of bullets) ctx.fillRect(b.x-3, b.y-3, 6, 6);
            
            // Powerups
            for (let p of powerups) {
                ctx.fillStyle = p.type === 'health' ? '#ff5555' : '#55ffaa';
                ctx.fillRect(p.x-10, p.y-10, 20, 20);
            }
            
            // Particles
            for (let p of particles) {
                ctx.globalAlpha = p.life / 25;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 4, p.y - 4, 8, 8);
            }
            ctx.globalAlpha = 1;
            ctx.restore();
        }
        
        function gameLoop() {
            if (gameRunning) {
                update();
                draw();
                requestAnimationFrame(gameLoop);
            }
        }
        
        window.addEventListener('keydown', e => { keys[e.key] = true; if (e.key.toLowerCase() === 'r') startReload(); });
        window.addEventListener('keyup', e => keys[e.key] = false);
        canvas.addEventListener('mousemove', e => {
            const r = canvas.getBoundingClientRect();
            mouse.x = e.clientX - r.left;
            mouse.y = e.clientY - r.top;
        });
        canvas.addEventListener('click', shoot);
        
        spawnWave();
        gameLoop();
    </script>
</body>
</html>
