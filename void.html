<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arena Fighting VS Bot</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #05050a; user-select: none; }
        
        /* HUD health displays */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
            z-index: 10;
        }
        .bar-container { width: 200px; height: 15px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        #player-hp { width: 100%; height: 100%; background: #2ed573; transition: 0.1s; }
        #bot-hp { width: 100%; height: 100%; background: #ff4757; transition: 0.1s; }

        /* Gameplay gameplay info overlay */
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        /* Return back to lobby button link */
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #161b22;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            z-index: 100;
        }
        .back-btn:hover { background: #21262d; color: white; }
    </style>
    <!-- Inject Three.js Engine Core Library Framework -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="hud">
        <h3 style="margin: 0 0 5px 0; color: #58a6ff;">ARENA COMBAT</h3>
        <div>Your HP (Green):</div>
        <div class="bar-container"><div id="player-hp"></div></div>
        <div>Bot Enemy HP (Red):</div>
        <div class="bar-container"><div id="bot-hp"></div></div>
    </div>

    <div id="controls-info">
        🎮 <b>Move:</b> W, A, S, D | ⚔️ <b>Strike Attack:</b> SPACEBAR
    </div>

    <a href="index.html" class="back-btn">⬅️ Exit to Lobby Portal</a>

    <script>
        // --- CHARACTERS ENGINE STATES CONFIGURATION ---
        const player = { hp: 100, maxHp: 100, speed: 0.08, mesh: null, isAttacking: false };
        const bot = { hp: 100, maxHp: 100, speed: 0.04, mesh: null, isAttacking: false, attackCooldown: 0 };
        const keys = { w: false, a: false, s: false, d: false, space: false };

        // --- ENVIRONMENT RENDER SCENE INITIALIZATION ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a16);
        scene.fog = new THREE.FogExp2(0x0a0a16, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 12); // Elevated isometric camera view layout

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Ambient global space scene illumination
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0x79a6ff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Circular physical battle floor ring platform
        const floorGeo = new THREE.CylinderGeometry(12, 12, 0.5, 32);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1f1f2e, roughness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.25;
        scene.add(floor);

        // --- CREATING CHARACTERS 3D BOX OBJECTS LAYER ---
        // Player Model Object Definition
        const pGeo = new THREE.BoxGeometry(1, 1.8, 1);
        const pMat = new THREE.MeshStandardMaterial({ color: 0x3498db });
        player.mesh = new THREE.Mesh(pGeo, pMat);
        player.mesh.position.set(-4, 0.9, 0);
        scene.add(player.mesh);

        // Player Physical Sword Attachment
        const swordGeo = new THREE.BoxGeometry(0.2, 1.2, 0.2);
        const swordMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f });
        const pSword = new THREE.Mesh(swordGeo, swordMat);
        pSword.position.set(0.6, 0, -0.6);
        pSword.rotation.x = Math.PI / 2; // Point weapon facing directly forward
        player.mesh.add(pSword);

        // Enemy Bot Model Object Definition
        const bGeo = new THREE.BoxGeometry(1, 1.8, 1);
        const bMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
        bot.mesh = new THREE.Mesh(bGeo, bMat);
        bot.mesh.position.set(4, 0.9, 0);
        scene.add(bot.mesh);

        // Enemy Bot Physical Sword Attachment
        const bSword = new THREE.Mesh(swordGeo, new THREE.MeshStandardMaterial({ color: 0xff3f34 }));
        bSword.position.set(-0.6, 0, -0.6);
        bSword.rotation.x = Math.PI / 2;
        bot.mesh.add(bSword);

        // --- INPUT EVENT INTERCEPT LISTENER ARRAYS ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = true;
            if (e.key.toLowerCase() === 'a') keys.a = true;
            if (e.key.toLowerCase() === 's') keys.s = true;
            if (e.key.toLowerCase() === 'd') keys.d = true;
            if (e.key === ' ') { keys.space = true; playerAttack(); }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = false;
            if (e.key.toLowerCase() === 'a') keys.a = false;
            if (e.key.toLowerCase() === 's') keys.s = false;
            if (e.key.toLowerCase() === 'd') keys.d = false;
            if (e.key === ' ') keys.space = false;
        });
        // --- COMBAT ATTACK ANIMATION LOGIC LAYER ---
        function playerAttack() {
            if (player.isAttacking) return;
            player.isAttacking = true;

            // Animate sword slash by spinning mesh container briefly
            let startTime = Date.now();
            function swingWeaponAnimation() {
                let elapsed = Date.now() - startTime;
                if (elapsed < 150) {
                    player.mesh.rotation.y += 0.1;
                    requestAnimationFrame(swingWeaponAnimation);
                } else if (elapsed < 300) {
                    player.mesh.rotation.y -= 0.1;
                    requestAnimationFrame(swingWeaponAnimation);
                } else {
                    player.isAttacking = false;
                    checkHit(player, bot, 'bot-hp'); // Distance calculations
                }
            }
            swingWeaponAnimation();
        }

        // Damage detection mapping algorithms
        function checkHit(attacker, target, barId) {
            const dist = attacker.mesh.position.distanceTo(target.mesh.position);
            
            // Vector proximity hit trigger verification check
            if (dist < 2.5) {
                target.hp -= 15;
                if (target.hp < 0) target.hp = 0;
                
                document.getElementById(barId).style.width = target.hp + "%";

                // Directional knockback impact calculations
                target.mesh.position.addScaledVector(
                    new THREE.Vector3().subVectors(target.mesh.position, attacker.mesh.position).normalize(), 
                    0.8
                );
                
                // End round state lifecycle handlers
                if (target.hp <= 0) {
                    setTimeout(() => {
                        alert(barId === 'bot-hp' ? "🎉 Victory! You defeated the enemy Bot!" : "💀 Defeat! The Bot knocked you out!");
                        // Reset map positioning assets values
                        player.hp = 100; bot.hp = 100;
                        player.mesh.position.set(-4, 0.9, 0);
                        bot.mesh.position.set(4, 0.9, 0);
                        document.getElementById('player-hp').style.width = "100%";
                        document.getElementById('bot-hp').style.width = "100%";
                    }, 200);
                }
            }
        }

        // --- SYSTEM ENGINE TICK MAIN ANIMATE CYCLE VECTORS ---
        function animate() {
            requestAnimationFrame(animate);

            // Process movement bindings parameters array
            if (keys.w) player.mesh.position.z -= player.speed;
            if (keys.s) player.mesh.position.z += player.speed;
            if (keys.a) player.mesh.position.x -= player.speed;
            if (keys.d) player.mesh.position.x += player.speed;

            // Restrict actors position constraints within perimeter wall circles radius boundaries
            const pDistFromCenter = player.mesh.position.distanceTo(new THREE.Vector3(0, 0.9, 0));
            if (pDistFromCenter > 11) {
                player.mesh.position.setLength(11);
                player.mesh.position.y = 0.9;
            }

            // Track relative target positions configurations for camera orientation parameters
            camera.position.x = player.mesh.position.x;
            camera.position.z = player.mesh.position.z + 12;

            // --- BOT EMBEDDED ARTIFICIAL INTELLIGENCE AUTO PATHFINDING ---
            bot.mesh.lookAt(player.mesh.position.x, bot.mesh.position.y, player.mesh.position.z);
            const distToPlayer = bot.mesh.position.distanceTo(player.mesh.position);

            if (distToPlayer > 2.0) {
                // If out of range, move bot along tracking path towards player's position
                const dir = new THREE.Vector3().subVectors(player.mesh.position, bot.mesh.position).normalize();
                bot.mesh.position.addScaledVector(dir, bot.speed);
            } else {
                // If close enough, cycle attacks on interval rate clock frames
                bot.attackCooldown++;
                if (bot.attackCooldown > 40) {
                    bot.attackCooldown = 0;
                    checkHit(bot, player, 'player-hp');
                    
                    // Squash/stretch scale visual tick action trigger alert animation
                    bot.mesh.scale.set(1.2, 1.2, 1.2);
                    setTimeout(() => bot.mesh.scale.set(1, 1, 1), 100);
                }
            }

            renderer.render(scene, camera);
        }

        // Execute process engine initialization loop loops pipeline
        animate();

        // Responsive layout window screen resize event tracking configuration hook
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
