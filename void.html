<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arena Combat 2D</title>
    <style>
        body { margin:0; background:#0a0a1f; color:#fff; font-family:Arial; overflow:hidden; text-align:center; }
        canvas { display:block; margin:20px auto; border:4px solid #334; image-rendering:pixelated; }
        #menu, #ui { position:absolute; top:15px; left:50%; transform:translateX(-50%); background:rgba(10,10,30,0.92); padding:20px; border-radius:12px; z-index:100; min-width:380px; }
        button { padding:10px 20px; margin:6px; background:#3366dd; color:white; border:none; border-radius:8px; font-size:16px; cursor:pointer; }
        button:hover { background:#5588ff; }
        select, input { margin:8px; padding:6px; }
        .skin { display:inline-block; width:50px; height:50px; border:3px solid #fff; margin:4px; cursor:pointer; }
    </style>
</head>
<body>
    <div id="menu">
        <h1>⚔️ ARENA COMBAT</h1>
        <h2>Customize</h2>
        <div>Body Skin:</div>
        <div id="skins"></div>
        <label>Color: <input type="color" id="color" value="#00aaff"></label><br>
        <label>Weapon: 
            <select id="weapon">
                <option value="0">Pistol</option>
                <option value="1" selected>Rifle</option>
                <option value="2">Shotgun</option>
                <option value="3">Heavy</option>
            </select>
        </label><br><br>
        <button onclick="startGame()">START GAME</button>
        <div>High Score: <span id="highscore">0</span></div>
    </div>

    <div id="ui" style="display:none">
        Wave <span id="wave">1</span> | Score <span id="score">0</span><br>
        HP: <div style="display:inline-block;width:280px;background:#222;height:26px;border:2px solid #555;"><div id="pHp" style="height:100%;background:#00ddff;width:100%"></div></div>
    </div>

    <canvas id="game" width="940" height="640"></canvas>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        let player = {}, enemies = [], bullets = [], particles = [], powerups = [];
        let keys = {}, mouse = {x:470, y:320}, wave = 1, score = 0, highScore = 0, gameRunning = false, shake = 0;
        
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, dur, type='sawtooth', vol=0.4) {
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = type; o.frequency.value = freq; g.gain.value = vol;
            o.connect(g).connect(audioCtx.destination); o.start(); o.stop(audioCtx.currentTime + dur);
        }
        
        function createExplosion(x,y,count,color) {
            for(let i=0;i<count;i++) {
                particles.push({x,y, vx:(Math.random()-0.5)*12, vy:(Math.random()-0.5)*12, life:22, color, size:5});
            }
        }
        
        const skins = ['#00aaff','#ff44aa','#44ff88','#ffaa22'];
        let selectedSkin = 0;
        
        function initMenu() {
            highScore = localStorage.getItem('arenaHS') || 0;
            document.getElementById('highscore').textContent = highScore;
            const sd = document.getElementById('skins');
            skins.forEach((c,i) => {
                const d = document.createElement('div');
                d.className = 'skin'; d.style.background = c;
                d.onclick = () => { selectedSkin = i; document.querySelectorAll('.skin').forEach(el=>el.style.borderColor='#fff'); d.style.borderColor = '#ff0'; };
                sd.appendChild(d);
            });
        }
        
        function startGame() {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            
            const color = document.getElementById('color').value;
            const wType = parseInt(document.getElementById('weapon').value);
            
            player = {
                x:220, y:320, size:36, speed: wType===3?5.2:6.2,
                hp:100, maxHp:100, angle:0, gunAngle:0,
                ammo: wType===3?7:wType===2?9:16, maxAmmo: wType===3?7:wType===2?9:16,
                reloading:false, reloadTime:0, lastShot:0,
                shootCooldown: [90,160,270,420][wType],
                weapon:wType, bodyColor:color, skin:skins[selectedSkin],
                bob:0, gunOffset:0, damageMult:1, speedMult:1
            };
            
            wave=1; score=0;
            spawnWave();
            gameRunning = true;
            gameLoop();
        }
        
        function spawnWave() {
            enemies = [];
            const count = wave % 4 === 0 ? 1 : Math.min(2 + Math.floor(wave/2), 5);
            for(let i=0; i<count; i++) {
                const isBoss = (wave % 4 === 0 && i===0);
                enemies.push({
                    x: 650 + Math.random()*100, y: 150 + Math.random()*340,
                    size: isBoss?54:32, speed: isBoss?3.6:2.8 + wave*0.25,
                    hp: isBoss?380 + wave*90 : 70 + wave*40,
                    maxHp: isBoss?380 + wave*90 : 70 + wave*40,
                    angle:0, isBoss
                });
            }
            document.getElementById('wave').textContent = wave;
        }
        
        function shoot() {
            if(!gameRunning || player.reloading || player.ammo<=0 || Date.now()-player.lastShot < player.shootCooldown) return;
            player.lastShot = Date.now();
            player.ammo--;
            player.gunOffset = -8;
            shake = 4;
            
            const bx = player.x + Math.cos(player.gunAngle)*42;
            const by = player.y + Math.sin(player.gunAngle)*42;
            const count = player.weapon===2 ? 3 : 1;
            for(let i=0;i<count;i++) {
                const a = player.gunAngle + (Math.random()-0.5)*0.2;
                bullets.push({x:bx,y:by,vx:Math.cos(a)*16,vy:Math.sin(a)*16,life:50,fromEnemy:false,dmg:player.damageMult});
            }
            playSound(240,0.1,'square');
        }
        
        function startReload() {
            if(player.reloading || player.ammo===player.maxAmmo) return;
            player.reloading = true;
            player.reloadTime = Date.now() + (player.weapon===3?2200:1400);
        }
        
        function spawnPowerup(x,y) {
            const types = ['health','speed','ammo','damage'];
            powerups.push({x,y+10,type:types[Math.floor(Math.random()*4)],life:380});
        }
        
        function update() {
            // Player move
            if(keys['w']||keys['W']) player.y -= player.speed * player.speedMult;
            if(keys['s']||keys['S']) player.y += player.speed * player.speedMult;
            if(keys['a']||keys['A']) player.x -= player.speed * player.speedMult;
            if(keys['d']||keys['D']) player.x += player.speed * player.speedMult;
            player.bob = (keys['w']||keys['s']||keys['a']||keys['d']) ? Math.sin(Date.now()/70)*2 : 0;
            
            player.x = Math.max(50, Math.min(canvas.width-50, player.x));
            player.y = Math.max(50, Math.min(canvas.height-50, player.y));
            
            player.gunAngle = Math.atan2(mouse.y-player.y, mouse.x-player.x);
            player.angle = player.gunAngle;
            if(player.gunOffset<0) player.gunOffset += 1.4;
            
            // Enemies
            for(let i=enemies.length-1; i>=0; i--) {
                const e = enemies[i];
                const dx = player.x - e.x, dy = player.y - e.y, d = Math.hypot(dx,dy)||1;
                e.x += (dx/d) * e.speed;
                e.y += (dy/d) * e.speed;
                e.angle = Math.atan2(dy,dx);
                
                if(Math.random() < 0.03) {
                    bullets.push({x:e.x,y:e.y,vx:dx/d*11,vy:dy/d*11,life:55,fromEnemy:true});
                }
            }
            
            // Bullets
            for(let i=bullets.length-1;i>=0;i--) {
                const b=bullets[i];
                b.x+=b.vx; b.y+=b.vy; b.life--;
                if(!b.fromEnemy) {
                    for(let j=enemies.length-1;j>=0;j--) {
                        const e=enemies[j];
                        if(Math.hypot(b.x-e.x,b.y-e.y) < e.size*0.8) {
                            e.hp -= 26 * (b.dmg||1);
                            bullets.splice(i,1);
                            if(e.hp<=0) {
                                createExplosion(e.x,e.y, e.isBoss?45:22, '#ff3366');
                                score += e.isBoss?500:120;
                                spawnPowerup(e.x,e.y);
                                enemies.splice(j,1);
                                if(enemies.length===0) { wave++; spawnWave(); document.getElementById('score').textContent=score; }
                            }
                            break;
                        }
                    }
                } else if(Math.hypot(b.x-player.x,b.y-player.y) < player.size*0.75) {
                    player.hp -= 18;
                    bullets.splice(i,1);
                    shake = 6;
                    if(player.hp<=0) endGame();
                }
                if(b.life<=0) bullets.splice(i,1);
            }
            
            // Powerups
            for(let i=powerups.length-1;i>=0;i--) {
                const p=powerups[i]; p.life--;
                if(Math.hypot(p.x-player.x, p.y-player.y)<40) {
                    if(p.type==='health') player.hp = Math.min(player.maxHp, player.hp+40);
                    else if(p.type==='speed') player.speedMult = 1.75;
                    else if(p.type==='ammo') player.ammo = player.maxAmmo;
                    else if(p.type==='damage') player.damageMult = 1.7;
                    powerups.splice(i,1);
                }
                if(p.life<=0) powerups.splice(i,1);
            }
            
            // Particles
            for(let i=particles.length-1;i>=0;i--) {
                const p=particles[i];
                p.x += p.vx; p.y += p.vy; p.life--;
                if(p.life<=0) particles.splice(i,1);
            }
            
            if(player.reloading && Date.now() > player.reloadTime) {
                player.ammo = player.maxAmmo; player.reloading = false;
            }
            
            if(keys[' ']) shoot();
        }
        
        function draw() {
            ctx.fillStyle = '#0f0f25';
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.strokeStyle = '#445577'; ctx.lineWidth=40;
            ctx.strokeRect(35,35,canvas.width-70,canvas.height-70);
            
            const sx = shake>0 ? (Math.random()-0.5)*shake : 0;
            ctx.save(); ctx.translate(sx,0); shake *= 0.8;
            
            // Player
            ctx.save();
            ctx.translate(player.x, player.y + player.bob);
            ctx.rotate(player.angle);
            ctx.fillStyle = player.skin;
            ctx.fillRect(-18,-18,36,36);
            ctx.fillStyle = player.bodyColor;
            ctx.fillRect(-13,-13,26,14);
            ctx.fillStyle = '#333';
            ctx.fillRect(16,-7,36,14);
            ctx.restore();
            
            // Enemies
            for(let e of enemies) {
                ctx.save();
                ctx.translate(e.x, e.y);
                ctx.rotate(e.angle);
                ctx.fillStyle = e.isBoss ? '#aa1122' : '#dd3333';
                ctx.fillRect(-e.size/2, -e.size/2, e.size, e.size);
                ctx.restore();
            }
            
            ctx.fillStyle = '#ffee88';
            for(let b of bullets) ctx.fillRect(b.x-3,b.y-3,6,6);
            
            for(let p of powerups) {
                ctx.fillStyle = p.type==='health'?'#ff5555':p.type==='speed'?'#44ff99':'#ffdd44';
                ctx.fillRect(p.x-9,p.y-9,18,18);
            }
            
            for(let p of particles) {
                ctx.globalAlpha = p.life/22;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x-3,p.y-3,6,6);
            }
            ctx.globalAlpha=1; ctx.restore();
        }
        
        function gameLoop() {
            if(!gameRunning) return;
            update();
            draw();
            document.getElementById('pHp').style.width = (player.hp/player.maxHp*100)+'%';
            requestAnimationFrame(gameLoop);
        }
        
        function endGame() {
            gameRunning = false;
            if(score > highScore) {
                highScore = score;
                localStorage.setItem('arenaHS', highScore);
            }
            alert(`Game Over! Score: ${score} | Wave: ${wave}`);
            setTimeout(()=>location.reload(),600);
        }
        
        window.addEventListener('keydown', e => { keys[e.key] = true; if(e.key.toLowerCase()==='r') startReload(); });
        window.addEventListener('keyup', e => keys[e.key] = false);
        canvas.addEventListener('mousemove', e => {
            const r = canvas.getBoundingClientRect();
            mouse.x = e.clientX - r.left;
            mouse.y = e.clientY - r.top;
        });
        canvas.addEventListener('click', shoot);
        
        initMenu();
    </script>
</body>
</html>
