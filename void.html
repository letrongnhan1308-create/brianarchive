<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Arena Fighting VS Bot</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #05050a; user-select: none; }
        
        /* Giao diện HUD hiển thị máu */
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.6);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
            z-index: 10;
        }
        .bar-container { width: 200px; height: 15px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        #player-hp { width: 100%; height: 100%; background: #2ed573; transition: 0.1s; }
        #bot-hp { width: 100%; height: 100%; background: #ff4757; transition: 0.1s; }

        /* Hướng dẫn chơi game */
        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        /* Nút quay về trang chủ */
        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #161b22;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            z-index: 100;
        }
        .back-btn:hover { background: #21262d; color: white; }
    </style>
    <!-- Nhúng thư viện đồ họa 3D Three.js -->
    <script src="https://cloudflare.com"></script>
</head>
<body>

    <div id="hud">
        <h3 style="margin: 0 0 5px 0; color: #58a6ff;">ARENA COMBAT</h3>
        <div>HP Của Bạn (Xanh):</div>
        <div class="bar-container"><div id="player-hp"></div></div>
        <div>HP Của Bot Kẻ Địch (Đỏ):</div>
        <div class="bar-container"><div id="bot-hp"></div></div>
    </div>

    <div id="controls-info">
        🎮 <b>Di chuyển:</b> W, A, S, D | ⚔️ <b>Tấn công:</b> Phím SPACE (Dấu cách)
    </div>

    <a href="index.html" class="back-btn">⬅️ Thoát ra Sảnh</a>

    <script>
        // --- CẤU HÌNH TRẠNG THÁI NHÂN VẬT ---
        const player = { hp: 100, maxHp: 100, speed: 0.08, mesh: null, isAttacking: false };
        const bot = { hp: 100, maxHp: 100, speed: 0.04, mesh: null, isAttacking: false, attackCooldown: 0 };
        
        const keys = { w: false, a: false, s: false, d: false, space: false };

        // --- KHỞI TẠO KHÔNG GIAN 3D ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a16);
        scene.fog = new THREE.FogExp2(0x0a0a16, 0.05);

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 10, 12); // Góc nhìn từ trên cao xuống xéo để dễ chiến đấu

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Ánh sáng trận đấu
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0x79a6ff, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Sàn đấu hình tròn
        const floorGeo = new THREE.CylinderGeometry(12, 12, 0.5, 32);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1f1f2e, roughness: 0.5 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.position.y = -0.25;
        scene.add(floor);

        // --- TẠO MÔ HÌNH NHÂN VẬT (BẰNG HÌNH KHỐI ĐỂ NHẸ GAME) ---
        // 1. Người chơi (Màu Xanh Dương)
        const pGeo = new THREE.BoxGeometry(1, 1.8, 1);
        const pMat = new THREE.MeshStandardMaterial({ color: 0x3498db });
        player.mesh = new THREE.Mesh(pGeo, pMat);
        player.mesh.position.set(-4, 0.9, 0);
        scene.add(player.mesh);

        // Kiếm của Người chơi
        const swordGeo = new THREE.BoxGeometry(0.2, 1.2, 0.2);
        const swordMat = new THREE.MeshStandardMaterial({ color: 0xf1c40f });
        const pSword = new THREE.Mesh(swordGeo, swordMat);
        pSword.position.set(0.6, 0, -0.6);
        pSword.rotation.x = Math.PI / 2; // Chỉa kiếm ra phía trước
        player.mesh.add(pSword);

        // 2. Kẻ địch / Bot AI (Màu Đỏ)
        const bGeo = new THREE.BoxGeometry(1, 1.8, 1);
        const bMat = new THREE.MeshStandardMaterial({ color: 0xe74c3c });
        bot.mesh = new THREE.Mesh(bGeo, bMat);
        bot.mesh.position.set(4, 0.9, 0);
        scene.add(bot.mesh);

        // Vũ khí của Bot
        const bSword = new THREE.Mesh(swordGeo, new THREE.MeshStandardMaterial({ color: 0xff3f34 }));
        bSword.position.set(-0.6, 0, -0.6);
        bSword.rotation.x = Math.PI / 2;
        bot.mesh.add(bSword);

        // --- HỆ THỐNG ĐIỀU KHIỂN (BẮT SỰ KIỆN BÀN PHÍM) ---
        window.addEventListener('keydown', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = true;
            if (e.key.toLowerCase() === 'a') keys.a = true;
            if (e.key.toLowerCase() === 's') keys.s = true;
            if (e.key.toLowerCase() === 'd') keys.d = true;
            if (e.key === ' ') {
                keys.space = true;
                playerAttack();
            }
        });

        window.addEventListener('keyup', (e) => {
            if (e.key.toLowerCase() === 'w') keys.w = false;
            if (e.key.toLowerCase() === 'a') keys.a = false;
            if (e.key.toLowerCase() === 's') keys.s = false;
            if (e.key.toLowerCase() === 'd') keys.d = false;
            if (e.key === ' ') keys.space = false;
        });

        // --- XỬ LÝ LÔ-GÍC CHIẾN ĐẤU ---
        function playerAttack() {
            if (player.isAttacking) return;
            player.isAttacking = true;

            // Hiệu ứng vung kiếm bằng cách xoay nhẹ thân vật thể
            let startTime = Date.now();
            function vungKiem() {
                let elapsed = Date.now() - startTime;
                if (elapsed < 150) {
                    player.mesh.rotation.y += 0.1;
                    requestAnimationFrame(vungKiem);
                } else if (elapsed < 300) {
                    player.mesh.rotation.y -= 0.1;
                    requestAnimationFrame(vungKiem);
                } else {
                    player.isAttacking = false;
                    // Kiểm tra xem khoảng cách có đủ gần để trúng Bot không
                    checkHit(player, bot, 'bot-hp');
                }
            }
            vungKiem();
        }

        function checkHit(attacker, target, barId) {
            // Tính khoảng cách giữa hai nhân vật trong không gian 3D
            const dist = attacker.mesh.position.distanceTo(target.mesh.position);
            
            // Nếu khoảng cách nhỏ hơn 2.5 đơn vị nghĩa là đánh trúng
            if (dist < 2.5) {
                target.hp -= 15;
                if (target.hp < 0) target.hp = 0;
                
                // Cập nhật thanh máu UI
                document.getElementById(barId).style.width = (target.hp < 0 ? 0 : target.hp) + "%";

                // Hiệu ứng giật lùi (Knockback) và nhấp nháy đỏ khi trúng đòn
                target.mesh.position.addScaledVector(
                    new THREE.Vector3().subVectors(target.mesh.position, attacker.mesh.position).normalize(), 
                    0.8
                );
                
                // Kiểm tra sinh tử
                if (target.hp <= 0) {
                    setTimeout(() => {
                        alert(barId === 'bot-hp' ? "🎉 Bạn đã chiến thắng trận đấu!" : "💀 Bạn đã bị Bot hạ gục!");
                        // Reset lại game
                        player.hp = 100;
                        bot.hp = 100;
                        player.mesh.position.set(-4, 0.9, 0);
                        bot.mesh.position.set(4, 0.9, 0);
                        document.getElementById('player-hp').style.width = "100%";
                        document.getElementById('bot-hp').style.width = "100%";
                    }, 200);
                }
            }
        }

        // --- VÒNG LẶP ĐỒ HỌA & AI CỦA BOT (CHẠY LIÊN TỤC) ---
        function animate() {
            requestAnimationFrame(animate);

            // 1. Xử lý di chuyển của Người chơi dựa trên cụm WASD
            if (keys.w) player.mesh.position.z -= player.speed;
            if (keys.s) player.mesh.position.z += player.speed;
            if (keys.a) player.mesh.position.x -= player.speed;
            if (keys.d) player.mesh.position.x += player.speed;

            // Giới hạn người chơi không bị chạy lọt ra ngoài vòng sàn đấu tròn
            const pDistFromCenter = player.mesh.position.distanceTo(new THREE.Vector3(0, 0.9, 0));
            if (pDistFromCenter > 11) {
                player.mesh.position.setLength(11);
                player.mesh.position.y = 0.9;
            }

            // Camera tự động chạy theo người chơi để giữ khung hình mượt mà
            camera.position.x = player.mesh.position.x;
            camera.position.z = player.mesh.position.z + 12;

            // 2. TRÍ TUỆ NHÂN TẠO CỦA BOT (BOT AI LOGIC)
            // Hướng mặt của Bot luôn quay về phía người chơi
bot.mesh.lookAt(player.mesh.position.x, bot.mesh.position.y, player.mesh.position.z);

const distToPlayer = bot.mesh.position.distanceTo(player.mesh.position);

if (distToPlayer > 2.0) {
    // Nếu ở xa, Bot sẽ tự động di chuyển áp sát vị trí người chơi
    const dir = new THREE.Vector3().subVectors(player.mesh.position, bot.mesh.position).normalize();
    bot.mesh.position.addScaledVector(dir, bot.speed);
} else {
    // Nếu đã áp sát đủ gần, Bot tiến hành vung kiếm đánh người chơi
    bot.attackCooldown++;
    if (bot.attackCooldown > 40) { // Tốc độ đánh của Bot
        bot.attackCooldown = 0;
        checkHit(bot, player, 'player-hp');
        
        // Hiệu ứng giật khối của Bot khi vung đao
        bot.mesh.scale.set(1.2, 1.2, 1.2);
        setTimeout(() => bot.mesh.scale.set(1, 1, 1), 100);
    }
}

// Render lại khung cảnh đồ họa 3D
renderer.render(scene, camera);
}

// Kích hoạt trò chơi hoạt động
animate();

// Tự động căn chỉnh kích thước đồ họa khi co giãn màn hình trình duyệt
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
