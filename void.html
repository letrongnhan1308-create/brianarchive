<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2D Arena Fighting VS Bot</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background: #0a0a16; user-select: none; }
        
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #333;
            pointer-events: none;
            z-index: 10;
        }
        .bar-container { width: 200px; height: 15px; background: #333; border-radius: 4px; overflow: hidden; margin-bottom: 8px; }
        #player-hp { width: 100%; height: 100%; background: #2ed573; transition: 0.1s; }
        #bot-hp { width: 100%; height: 100%; background: #ff4757; transition: 0.1s; }

        #controls-info {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaa;
            background: rgba(0,0,0,0.8);
            padding: 10px 20px;
            border-radius: 20px;
            font-size: 14px;
            text-align: center;
            pointer-events: none;
            z-index: 10;
        }

        .back-btn {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #161b22;
            color: #8b949e;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            font-weight: bold;
            font-size: 14px;
            z-index: 100;
        }
        .back-btn:hover { background: #21262d; color: white; }
        
        /* Màn hình Canvas vẽ trò chơi */
        canvas { display: block; width: 100vw; height: 100vh; }
    </style>
</head>
<body>

    <div id="hud">
        <h3 style="margin: 0 0 5px 0; color: #58a6ff;">ARENA COMBAT (2D MODE)</h3>
        <div>Your HP (Blue):</div>
        <div class="bar-container"><div id="player-hp"></div></div>
        <div>Bot Enemy HP (Red):</div>
        <div class="bar-container"><div id="bot-hp"></div></div>
    </div>

    <div id="controls-info">
        🎮 <b>Move:</b> W, A, S, D | ⚔️ <b>Strike Attack:</b> SPACEBAR
    </div>

    <a href="index.html" class="back-btn">⬅️ Exit to Lobby Portal</a>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        // Tự động chỉnh kích thước canvas theo màn hình
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- CẤU HÌNH NHÂN VẬT ---
        const player = {
            x: window.innerWidth / 2 - 100,
            y: window.innerHeight / 2,
            size: 40,
            hp: 100,
            speed: 5,
            isAttacking: false,
            attackTimer: 0
        };

        const bot = {
            x: window.innerWidth / 2 + 100,
            y: window.innerHeight / 2,
            size: 40,
            hp: 100,
            speed: 2.2,
            attackCooldown: 0
        };

        const keys = { w: false, a: false, s: false, d: false };

        // --- BẮT SỰ KIỆN PHÍM BẤM ---
        window.addEventListener('keydown', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = true;
            if (k === 'a') keys.a = true;
            if (k === 's') keys.s = true;
            if (k === 'd') keys.d = true;
            if (e.key === ' ') {
                if (!player.isAttacking) {
                    player.isAttacking = true;
                    player.attackTimer = 10; // Đòn đánh kéo dài 10 khung hình
                    checkHit(player, bot, 'bot-hp');
                }
            }
        });

        window.addEventListener('keyup', (e) => {
            const k = e.key.toLowerCase();
            if (k === 'w') keys.w = false;
            if (k === 'a') keys.a = false;
            if (k === 's') keys.s = false;
            if (k === 'd') keys.d = false;
        });

        // --- KIỂM TRA VA CHẠM ĐÒN ĐÁNH ---
        function checkHit(attacker, target, barId) {
            const dx = target.x - attacker.x;
            const dy = target.y - attacker.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            // Khoảng cách đủ gần để trúng đòn (80 pixel)
            if (distance < 80) {
                target.hp -= 15;
                if (target.hp < 0) target.hp = 0;
                document.getElementById(barId).style.width = target.hp + "%";

                // Hiệu ứng đẩy lùi (Knockback)
                const angle = Math.atan2(dy, dx);
                target.x += Math.cos(angle) * 35;
                target.y += Math.sin(angle) * 35;

                // Kiểm tra kết thúc trận đấu
                if (target.hp <= 0) {
                    setTimeout(() => {
                        alert(barId === 'bot-hp' ? "🎉 Victory! You defeated the enemy Bot!" : "💀 Defeat! The Bot knocked you out!");
                        player.hp = 100;
                        bot.hp = 100;
                        player.x = canvas.width / 2 - 100;
                        player.y = canvas.height / 2;
                        bot.x = canvas.width / 2 + 100;
                        bot.y = canvas.height / 2;
                        document.getElementById('player-hp').style.width = "100%";
                        document.getElementById('bot-hp').style.width = "100%";
                    }, 200);
                }
            }
        }

        // --- VÒNG LẶP GAME CHẠY LIÊN TỤC ---
        function update() {
            // 1. Người chơi di chuyển dựa trên WASD
            if (keys.w) player.y -= player.speed;
            if (keys.s) player.y += player.speed;
            if (keys.a) player.x -= player.speed;
            if (keys.d) player.x += player.speed;

            // Xử lý thời gian vung kiếm của người chơi
            if (player.isAttacking) {
                player.attackTimer--;
                if (player.attackTimer <= 0) player.isAttacking = false;
            }

            // 2. AI của Bot di chuyển đuổi theo Người chơi
            const dx = player.x - bot.x;
            const dy = player.y - bot.y;
            const distance = Math.sqrt(dx * dx + dy * dy);

            if (distance > 45) {
                // Đuổi theo người chơi nếu ở xa
                bot.x += (dx / distance) * bot.speed;
                bot.y += (dy / distance) * bot.speed;
            } else {
                // Tấn công người chơi nếu đứng sát
                bot.attackCooldown++;
                if (bot.attackCooldown > 35) {
                    bot.attackCooldown = 0;
                    checkHit(bot, player, 'player-hp');
                }
            }

            // --- VẼ ĐỒ HỌA LÊN MÀN HÌNH ---
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Xóa màn hình cũ

            // Vẽ sàn đấu vòng tròn trung tâm
            ctx.beginPath();
            ctx.arc(canvas.width / 2, canvas.height / 2, 220, 0, Math.PI * 2);
            ctx.fillStyle = "#161b22";
            ctx.fill();
            ctx.strokeStyle = "#30363d";
            ctx.lineWidth = 5;
            ctx.stroke();

            // Vẽ tầm đánh khi Người chơi tấn công
            if (player.isAttacking) {
                ctx.beginPath();
                ctx.arc(player.x, player.y, 65, 0, Math.PI * 2);
                ctx.fillStyle = "rgba(88, 166, 255, 0.2)";
                ctx.fill();
            }

            // Vẽ Người chơi (Khối màu Xanh Dương)
            ctx.fillStyle = "#58a6ff";
            ctx.fillRect(player.x - player.size / 2, player.y - player.size / 2, player.size, player.size);

            // Vẽ Bot Kẻ địch (Khối màu Đỏ)
            ctx.fillStyle = "#ff4757";
            ctx.fillRect(bot.x - bot.size / 2, bot.y - bot.size / 2, bot.size, bot.size);

            requestAnimationFrame(update);
        }

        // Khởi chạy vòng lặp trò chơi
        update();
    </script>
</body>
</html>
