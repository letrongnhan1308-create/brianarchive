<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empire Tycoon</title>
    <style>
        body { margin:0; background:linear-gradient(#112233,#001122); color:#fff; font-family:Arial; text-align:center; }
        #money { font-size:48px; color:#00ffaa; margin:20px; }
        .shop { display:grid; grid-template-columns:repeat(auto-fit, minmax(260px,1fr)); gap:15px; max-width:1100px; margin:30px auto; padding:0 20px; }
        .item { background:rgba(255,255,255,0.1); padding:18px; border-radius:12px; cursor:pointer; }
        .item:hover { background:rgba(0,255,180,0.25); }
    </style>
</head>
<body>
    <h1>💰 EMPIRE TYCOON</h1>
    <div id="money">$0</div>
    <div id="income">Income: $0/sec</div>
    <button onclick="clickEarn()" style="padding:15px 30px; font-size:20px; margin:20px;">💵 CLICK TO EARN</button>
    
    <div class="shop" id="shop"></div>

    <script>
        let money = 120;
        let totalIncome = 0;
        let buildings = [
            {name:"Lemonade", cost:25, income:2, count:0, mult:1.15},
            {name:"Coffee Shop", cost:110, income:9, count:0, mult:1.18},
            {name:"Pizza Place", cost:520, income:32, count:0, mult:1.20},
            {name:"Supermarket", cost:2400, income:135, count:0, mult:1.23},
            {name:"Tech Startup", cost:13500, income:720, count:0, mult:1.26},
        ];
        
        function format(n) { return '$' + Math.floor(n).toLocaleString(); }
        
        function updateUI() {
            document.getElementById('money').textContent = format(money);
            document.getElementById('income').textContent = `Income: ${format(totalIncome)}/sec`;
            
            const shop = document.getElementById('shop');
            shop.innerHTML = '';
            buildings.forEach((b,i) => {
                const el = document.createElement('div');
                el.className = 'item';
                el.innerHTML = `<strong>${b.name}</strong><br>Owned: ${b.count}<br>Income: ${format(b.income*b.count)}/sec<br>Cost: ${format(b.cost)}`;
                el.onclick = () => buy(i);
                shop.appendChild(el);
            });
        }
        
        function clickEarn() {
            money += 12;
            updateUI();
        }
        
        function buy(i) {
            const b = buildings[i];
            if (money >= b.cost) {
                money -= b.cost;
                b.count++;
                totalIncome += b.income;
                b.cost = Math.floor(b.cost * b.mult);
                updateUI();
            }
        }
        
        function tick() {
            money += totalIncome / 10;
            updateUI();
        }
        
        setInterval(tick, 100);
        updateUI();
    </script>
</body>
</html>
